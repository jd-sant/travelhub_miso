name: PR Validation

on:
  pull_request:
    branches:
      - develop
      - release
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  validate-pr-description:
    runs-on: ubuntu-latest
    steps:
      - name: Validate pull request description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body ?? "";
            if (!body.trim()) {
              core.setFailed("La descripcion del PR es obligatoria y no puede estar vacia.");
            }

  validate-no-merge-conflicts:
    runs-on: ubuntu-latest
    steps:
      - name: Validate merge conflicts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            let pr;
            for (let attempt = 0; attempt < 6; attempt++) {
              const response = await github.rest.pulls.get({ owner, repo, pull_number });
              pr = response.data;

              if (pr.mergeable !== null) {
                break;
              }

              await new Promise((resolve) => setTimeout(resolve, 2000));
            }

            if (pr.mergeable === false || pr.mergeable_state === 'dirty') {
              core.setFailed('El PR tiene conflictos de merge con la rama destino.');
            }

  validate-tests:
    concurrency:
      group: pr-tests-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    if: >-
      github.event.action == 'synchronize' ||
      (github.base_ref == 'develop' && startsWith(github.head_ref, 'feature/')) ||
      (github.base_ref == 'release' && github.head_ref == 'develop') ||
      (github.base_ref == 'main' && github.head_ref == 'release')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q
