name: PR Validation

on:
  pull_request:
    branches:
      - develop
      - release
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  validate-pr-description:
    runs-on: ubuntu-latest
    steps:
      - name: Validate pull request description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body ?? "";
            if (!body.trim()) {
              core.setFailed("La descripcion del PR es obligatoria y no puede estar vacia.");
            }

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      users: ${{ steps.filter.outputs.users }}
      security: ${{ steps.filter.outputs.security }}
      payments: ${{ steps.filter.outputs.payments }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            users:
              - 'services/users/**'
            security:
              - 'services/security/**'
            payments:
              - 'services/payments/**'

  test-users:
    needs: [validate-pr-description, detect-changes]
    if: needs.detect-changes.outputs.users == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r services/users/requirements.txt

      - name: Run users tests
        run: PYTHONPATH=services/users/src pytest services/users/tests/ -v

  test-security:
    needs: [validate-pr-description, detect-changes]
    if: needs.detect-changes.outputs.security == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r services/security/requirements.txt

      - name: Run security tests
        run: PYTHONPATH=services/security/src pytest services/security/tests/ -v

  test-payments:
    needs: [validate-pr-description, detect-changes]
    if: needs.detect-changes.outputs.payments == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r services/payments/requirements.txt

      - name: Run payments tests
        run: PYTHONPATH=services/payments/src pytest services/payments/tests/ -v
