name: PR Validation

on:
  pull_request:
    branches:
      - develop
      - release
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  validate-pr-description:
    runs-on: ubuntu-latest
    steps:
      - name: Validate pull request description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body ?? "";
            if (!body.trim()) {
              core.setFailed("La descripcion del PR es obligatoria y no puede estar vacia.");
            }

  validate-tests:
    concurrency:
      group: pr-tests-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    if: >-
      github.event.action == 'synchronize' ||
      (github.base_ref == 'develop' && startsWith(github.head_ref, 'feature/')) ||
      (github.base_ref == 'release' && github.head_ref == 'develop') ||
      (github.base_ref == 'main' && github.head_ref == 'release')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q
