services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - auth-service
      - trips-service
      - users-service
    networks:
      - travelhub-net

  auth-service:
    build:
      context: ./backend/services/auth-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - SECRET_KEY=${AUTH_SECRET_KEY:-change-me-in-production}
      - CORS_ORIGINS=["http://localhost:3000"]
    networks:
      - travelhub-net

  trips-service:
    build:
      context: ./backend/services/trips-service
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - CORS_ORIGINS=["http://localhost:3000"]
    networks:
      - travelhub-net

  users-service:
    build:
      context: ./backend/services/users-service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - CORS_ORIGINS=["http://localhost:3000"]
    networks:
      - travelhub-net

networks:
  travelhub-net:
    driver: bridge
