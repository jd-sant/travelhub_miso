services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: travelhub
      POSTGRES_USER: travelhub_user
      POSTGRES_PASSWORD: travelhub_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelhub_user -d travelhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  users:
    build:
      context: ./services/users
    environment:
      PYTHONPATH: /app/src
      RDS_HOSTNAME: postgres
      RDS_USERNAME: travelhub_user
      RDS_PASSWORD: travelhub_pass
      RDS_DB_NAME: travelhub
      RDS_PORT: "5432"
      DB_SCHEMA: users_schema
      DB_ECHO: "False"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  security:
    build:
      context: ./services/security
    environment:
      PYTHONPATH: /app/src
      RDS_HOSTNAME: postgres
      RDS_USERNAME: travelhub_user
      RDS_PASSWORD: travelhub_pass
      RDS_DB_NAME: travelhub
      RDS_PORT: "5432"
      DB_SCHEMA: security_schema
      DB_ECHO: "False"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      USERS_SERVICE_URL: http://users:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@travelhub.com}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      users:
        condition: service_started

  reservations:
    build:
      context: ./services/reservations
    environment:
      PYTHONPATH: /app/src
      ENV: production
      APP_ENV: production
      RDS_HOSTNAME: postgres
      RDS_USERNAME: travelhub_user
      RDS_PASSWORD: travelhub_pass
      RDS_DB_NAME: travelhub
      RDS_PORT: "5432"
      DB_SCHEMA: reservations_schema
      DB_ECHO: "False"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy

  payments:
    build:
      context: ./services/payments
    environment:
      PYTHONPATH: /app/src
      RDS_HOSTNAME: postgres
      RDS_USERNAME: travelhub_user
      RDS_PASSWORD: travelhub_pass
      RDS_DB_NAME: travelhub
      RDS_PORT: "5432"
      DB_SCHEMA: payments_schema
      DB_ECHO: "False"
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER}
      PAYMENT_DUPLICATE_WINDOW_SECONDS: "2"
      ENFORCE_TLS_HEADER: "True"
      PAYMENT_INTEGRITY_SECRET: ${PAYMENT_INTEGRITY_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      ALLOWED_CORS_ORIGINS: ${ALLOWED_CORS_ORIGINS}
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:



