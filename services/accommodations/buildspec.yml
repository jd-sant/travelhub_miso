version: 0.2

phases:
  pre_build:
    commands:
      - echo "Building Accommodations Service..."
      - pip install -r requirements.txt

  build:
    commands:
      - echo "Running tests..."
      - PYTHONPATH=src pytest tests/ -v

  post_build:
    commands:
      - echo "Build completed successfully"

artifacts:
  files:
    - "**/*"
